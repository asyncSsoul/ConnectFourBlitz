services:
  frontend:
    image: node:22-slim
    container_name: connect4-frontend
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    # Ставим всё через npm, игнорируя скрипты sharp, и запускаем дев-сервер
    command: sh -c "npm config set strict-ssl false && npm install --ignore-scripts && npm run dev -- -H 0.0.0.0"
    environment:
      - NODE_ENV=development
      - NODE_TLS_REJECT_UNAUTHORIZED=0